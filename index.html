<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>ChatBot</title>
</head>
<body>
    <header class="fixed top-0 left-0 w-full border-b border-gray-600 z-50">
        <nav class="flex m-4 justify-between items-center">
            <h1 class="text-xl font-bold">ChatBot</h1>
            <i id="burger" class="fa-solid fa-bars text-center pb-2"></i>
            <div id="menu" class="hidden absolute top-16 right-4 shadow-lg rounded-xl p-4 w-48">
                <h2 class="font-bold mb-2">Paramètres</h2>
                <button id="theme" class="block w-full text-left p-2 hover:bg-gray-100 rounded"><i class="fa-solid fa-circle-half-stroke pr-1"></i>Thème</button>
                <button class="block w-full text-left p-2 hover:bg-gray-100 rounded"><i class="fa-solid fa-language pr-1"></i>Langue</button>
                <button class="block w-full text-left p-2 hover:bg-gray-100 rounded"><i class="fa-solid fa-arrow-rotate-left pr-1"></i>Reset chat</button>
            </div>
        </nav>
    </header>
    <main class="m-4 h-screen flex flex-col">
        <section id="chat" class="flex-1 overflow-y-auto p-4 pb-32">
            <div id="reponse" class="mt-4 text-gray-700"></div>
        </section>
        <section>
            <div class="fixed bottom-0 left-0 w-full p-4">
                <div class="flex items-end gap-2 border border-gray-300 rounded-3xl px-4 py-3 shadow-sm">
                    <textarea placeholder="Écrivez un message..." rows="1" class="flex-1 resize-none outline-none bg-transparent my-auto" id="question"></textarea>
                    <button class="p-2 rounded-full bg-black hover:bg-[#05020299] text-white" id="btn">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </div>        
        </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
