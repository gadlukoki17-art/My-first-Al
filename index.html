<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>ChatBot</title>
</head>
<body>
    <header class="border-b border-gray-600 ">
        <nav class="flex m-4 justify-between items-center">
            <h1 class="text-xl">ChatBot</h1>
            <i class="fa-solid fa-bars text-center pb-2"></i>
        </nav>
    </header>
    <main>
        <section>
            <p id="reponse"></p>
        </section>
        <section>
            <div class="fixed bottom-0 left-0 w-full p-4 bg-white">
                <div class="flex items-end gap-2 border border-gray-300 rounded-3xl px-4 py-3 shadow-sm">
                    <textarea placeholder="Écrivez un message..." rows="1" class="flex-1 resize-none outline-none bg-transparent my-auto"></textarea>
                    <button class="p-2 rounded-full bg-black text-white">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </div>        
        </section>
    </main>
</body>
</html>
